<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPS × PDF 校稿工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root{--ink:#1a1410;--paper:#f5f0e8;--gold:#b8860b;--gl:#d4a843;--red:#c0392b;--green:#2d6a4f;--amber:#d97706;--border:#c8b89a;--card:#fdfaf4}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:sans-serif;min-height:100vh}
  header{text-align:center;padding:28px 20px 18px;border-bottom:2px solid var(--border)}
  header::after{content:'';display:block;width:60px;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:10px auto 0}
  h1{font-size:1.4rem;font-weight:600;letter-spacing:.08em}
  h1 span{color:var(--gold)}
  .sub{font-size:.75rem;color:#7a6a5a;margin-top:5px}
  .wrap{max-width:900px;margin:0 auto;padding:20px 16px 60px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
  .zone{display:block;background:var(--card);border:2px dashed var(--border);border-radius:6px;padding:20px 14px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
  .zone:hover{border-color:var(--gold)}
  .zone.done{border-style:solid;border-color:var(--green);background:#f0faf4}
  .zone .bar{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--green),#52b788,var(--green));opacity:0;transition:.2s}
  .zone.done .bar{opacity:1}
  .zone-icon{font-size:1.6rem;margin-bottom:5px}
  .zone-label{font-size:.82rem;font-weight:600;color:var(--gold)}
  .zone-hint{font-size:.68rem;color:#9a8a7a;margin-top:3px}
  .zone-name{font-size:.68rem;font-family:monospace;color:var(--green);margin-top:6px;word-break:break-all}
  input[type=file]{display:none}
  .btn{display:block;width:100%;padding:13px;background:var(--ink);color:var(--gl);border:none;border-radius:4px;font-size:.9rem;font-weight:600;letter-spacing:.14em;cursor:pointer;font-family:inherit;margin-bottom:16px;transition:.2s}
  .btn:disabled{background:#c8b89a;color:#f5f0e8;cursor:not-allowed}
  .prog-wrap{background:#e8dfc8;border-radius:2px;height:4px;margin-bottom:8px;overflow:hidden;display:none}
  .prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gl));width:0%;transition:width .3s}
  .status{text-align:center;font-size:.8rem;color:#7a6a5a;margin-bottom:12px;min-height:18px}
  .status.err{color:var(--red)}
  .result-wrap{display:none}
  .verdict{text-align:center;padding:12px;border-radius:4px;margin-bottom:14px;font-weight:600;font-size:.9rem}
  .v-pass{background:#d1fae5;color:var(--green);border:1px solid #6ee7b7}
  .v-fail{background:#fee2e2;color:var(--red);border:1px solid #fca5a5}
  .compare-area{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
  .img-box{border:1px solid var(--border);border-radius:4px;overflow:hidden;background:#111}
  .img-title{background:var(--ink);color:var(--gl);font-size:.7rem;font-weight:600;padding:5px 10px;letter-spacing:.1em}
  .img-box canvas{width:100%;display:block}
  .diff-box{border:1px solid var(--border);border-radius:4px;overflow:hidden;background:#111;margin-bottom:14px}
  .diff-title{background:var(--red);color:#fff;font-size:.7rem;font-weight:600;padding:5px 10px;letter-spacing:.1em}
  .diff-box canvas{width:100%;display:block}
  .stats{background:var(--ink);color:var(--paper);border-radius:4px;padding:12px 16px;display:flex;gap:16px;justify-content:center;align-items:center;margin-bottom:14px}
  .snum{text-align:center}
  .snum .n{font-size:1.5rem;font-weight:600;display:block;line-height:1}
  .snum .l{font-size:.65rem;color:#c8b89a;margin-top:2px}
  .sdiv{width:1px;height:28px;background:rgba(255,255,255,.15)}
  .hint{background:var(--card);border:1px solid var(--border);border-left:4px solid var(--amber);border-radius:0 4px 4px 0;padding:10px 14px;font-size:.8rem;line-height:1.6;color:#5a4a3a}
  .empty{text-align:center;padding:36px;color:#9a8a7a;font-size:.84rem}
  .empty .ico{font-size:2.4rem;display:block;margin-bottom:10px;opacity:.3}
  @media(max-width:500px){.grid2,.compare-area{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <h1>EPS <span>×</span> PDF 校稿工具</h1>
  <p class="sub">不需 API · 不需付費 · 直接比對差異位置</p>
</header>
<div class="wrap">
  <div class="grid2">
    <label class="zone" id="ez" for="ei">
      <div class="bar"></div>
      <div class="zone-icon">📐</div>
      <div class="zone-label">EPS 原始稿</div>
      <div class="zone-hint">點擊選擇 .eps</div>
      <div class="zone-name" id="en"></div>
      <input type="file" id="ei" accept=".eps,application/postscript">
    </label>
    <label class="zone" id="pz" for="pi">
      <div class="bar"></div>
      <div class="zone-icon">📄</div>
      <div class="zone-label">PDF 校稿稿</div>
      <div class="zone-hint">點擊選擇 .pdf</div>
      <div class="zone-name" id="pn"></div>
      <input type="file" id="pi" accept=".pdf,application/pdf">
    </label>
  </div>
  <div class="prog-wrap" id="pw"><div class="prog-fill" id="pf"></div></div>
  <div class="status" id="st"></div>
  <button class="btn" id="btn" disabled onclick="run()">▶ 開始比對校稿</button>

  <div class="result-wrap" id="rw">
    <div class="verdict" id="verdict"></div>
    <div class="stats" id="stats"></div>
    <div class="compare-area">
      <div class="img-box"><div class="img-title">EPS 原始稿</div><canvas id="ec"></canvas></div>
      <div class="img-box"><div class="img-title">PDF 校稿稿</div><canvas id="pc"></canvas></div>
    </div>
    <div class="diff-box">
      <div class="diff-title">🔴 差異標示圖（紅色 = 有差異）</div>
      <canvas id="dc"></canvas>
    </div>
    <div class="hint" id="hint"></div>
  </div>

  <div class="empty" id="empty"><span class="ico">🔍</span>上傳兩份檔案後點擊比對</div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let epsFile=null,pdfFile=null;
function setup(ii,zi,ni,type){
  const inp=document.getElementById(ii),zone=document.getElementById(zi),nameEl=document.getElementById(ni);
  inp.addEventListener('change',e=>{
    const f=e.target.files[0];if(!f)return;
    if(type==='eps')epsFile=f;else pdfFile=f;
    nameEl.textContent=f.name+' ('+(f.size/1024).toFixed(0)+'KB)';
    zone.classList.add('done');check();
  });
}
setup('ei','ez','en','eps');setup('pi','pz','pn','pdf');
function check(){document.getElementById('btn').disabled=!(epsFile&&pdfFile);}
function setP(pct,txt){
  document.getElementById('pw').style.display='block';
  document.getElementById('pf').style.width=pct+'%';
  if(txt!==undefined){const s=document.getElementById('st');s.textContent=txt;s.className='status';}
}
function setErr(txt){const s=document.getElementById('st');s.textContent='❌ '+txt;s.className='status err';document.getElementById('pw').style.display='none';}

async function epsToPNG(file){
  setP(10,'上傳 EPS 轉換中...');
  const jobResp=await fetch('https://api.cloudconvert.com/v2/jobs',{
    method:'POST',
    headers:{'Authorization':'Bearer '+CC_KEY,'Content-Type':'application/json'},
    body:JSON.stringify({tasks:{
      'upload':{operation:'import/upload'},
      'convert':{operation:'convert',input:'upload',input_format:'eps',output_format:'png',engine:'graphicsmagick',width:2000},
      'export':{operation:'export/url',input:'convert'}
    }})
  });
  const job=await jobResp.json();
  if(!jobResp.ok)throw new Error('CloudConvert失敗: '+(job.message||''));
  const uploadTask=job.data.tasks.find(t=>t.name==='upload');
  const fd=new FormData();
  Object.entries(uploadTask.result.form.parameters).forEach(([k,v])=>fd.append(k,v));
  fd.append('file',file);
  setP(20,'上傳中...');
  await fetch(uploadTask.result.form.url,{method:'POST',body:fd});
  setP(30,'轉換中...');
  const jobId=job.data.id;
  for(let i=0;i<30;i++){
    await new Promise(r=>setTimeout(r,2000));
    const s=await(await fetch('https://api.cloudconvert.com/v2/jobs/'+jobId,{headers:{'Authorization':'Bearer '+CC_KEY}})).json();
    const exp=s.data.tasks.find(t=>t.name==='export');
    if(exp?.status==='finished')return exp.result.files[0].url;
    if(s.data.status==='error')throw new Error('轉換失敗');
  }
  throw new Error('轉換逾時');
}

async function urlToCanvas(url,targetCanvas){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.crossOrigin='anonymous';
    img.onload=()=>{
      targetCanvas.width=img.naturalWidth;
      targetCanvas.height=img.naturalHeight;
      targetCanvas.getContext('2d').drawImage(img,0,0);
      res(targetCanvas);
    };
    img.onerror=rej;
    img.src=url;
  });
}

async function pdfToCanvas(file,targetCanvas){
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  const page=await pdf.getPage(1);
  // Find content area
  const vpLow=page.getViewport({scale:1});
  const tmp=document.createElement('canvas');
  tmp.width=vpLow.width;tmp.height=vpLow.height;
  await page.render({canvasContext:tmp.getContext('2d'),viewport:vpLow}).promise;
  const ctx=tmp.getContext('2d');
  const d=ctx.getImageData(0,0,tmp.width,tmp.height).data;
  let minX=tmp.width,maxX=0,minY=tmp.height,maxY=0;
  for(let y=0;y<tmp.height;y++)for(let x=0;x<tmp.width;x++){
    const i=(y*tmp.width+x)*4;
    if(d[i]<240||d[i+1]<240||d[i+2]<240){
      if(x<minX)minX=x;if(x>maxX)maxX=x;if(y<minY)minY=y;if(y>maxY)maxY=y;
    }
  }
  const pad=8,scale=3;
  minX=Math.max(0,minX-pad);minY=Math.max(0,minY-pad);
  maxX=Math.min(tmp.width,maxX+pad);maxY=Math.min(tmp.height,maxY+pad);
  const vpHi=page.getViewport({scale});
  const full=document.createElement('canvas');
  full.width=vpHi.width;full.height=vpHi.height;
  await page.render({canvasContext:full.getContext('2d'),viewport:vpHi}).promise;
  const cw=(maxX-minX)*scale,ch=(maxY-minY)*scale;
  targetCanvas.width=cw;targetCanvas.height=ch;
  targetCanvas.getContext('2d').drawImage(full,minX*scale,minY*scale,cw,ch,0,0,cw,ch);
  return targetCanvas;
}

function diffCanvases(ca,cb,diffCanvas){
  const W=Math.min(ca.width,cb.width),H=Math.min(ca.height,cb.height);
  const ctxA=ca.getContext('2d'),ctxB=cb.getContext('2d');
  const dA=ctxA.getImageData(0,0,W,H).data;
  const dB=ctxB.getImageData(0,0,W,H).data;

  diffCanvas.width=W;diffCanvas.height=H;
  const ctxD=diffCanvas.getContext('2d');
  // Draw blended base
  ctxD.globalAlpha=0.4;ctxD.drawImage(ca,0,0,W,H);ctxD.globalAlpha=1;
  const outImg=ctxD.getImageData(0,0,W,H);
  const out=outImg.data;

  // Block-based diff (8x8 blocks)
  const BS=8;
  let diffBlocks=0,totalBlocks=0;
  const diffMap=[];
  for(let by=0;by<H;by+=BS){
    for(let bx=0;bx<W;bx+=BS){
      totalBlocks++;
      let sum=0,cnt=0;
      for(let y=by;y<Math.min(by+BS,H);y++){
        for(let x=bx;x<Math.min(bx+BS,W);x++){
          const i=(y*W+x)*4;
          const dr=dA[i]-dB[i],dg=dA[i+1]-dB[i+1],db=dA[i+2]-dB[i+2];
          sum+=Math.sqrt(dr*dr+dg*dg+db*db);cnt++;
        }
      }
      const avg=sum/cnt;
      diffMap.push({bx,by,avg});
      if(avg>30)diffBlocks++;
    }
  }

  // Draw diff highlights
  const threshold=30;
  for(const{bx,by,avg}of diffMap){
    if(avg>threshold){
      const intensity=Math.min(1,(avg-threshold)/100);
      for(let y=by;y<Math.min(by+BS,H);y++){
        for(let x=bx;x<Math.min(bx+BS,W);x++){
          const i=(y*W+x)*4;
          out[i]=255;
          out[i+1]=Math.floor(out[i+1]*(1-intensity));
          out[i+2]=Math.floor(out[i+2]*(1-intensity));
          out[i+3]=255;
        }
      }
    }
  }
  ctxD.putImageData(outImg,0,0);

  const pct=Math.round(diffBlocks/totalBlocks*100);
  return{diffBlocks,totalBlocks,pct};
}

async function run(){
  if(!epsFile||!pdfFile)return;
  document.getElementById('btn').disabled=true;
  document.getElementById('rw').style.display='none';
  document.getElementById('empty').style.display='none';

  try{
    // EPS → PNG via CloudConvert
    const epsPngUrl=await epsToPNG(epsFile);

    setP(55,'渲染 PDF...');
    const ec=document.getElementById('ec');
    const pc=document.getElementById('pc');
    await urlToCanvas(epsPngUrl,ec);
    await pdfToCanvas(pdfFile,pc);

    setP(80,'比對差異...');
    // Resize to same size for comparison
    const W=Math.max(ec.width,pc.width),H=Math.max(ec.height,pc.height);
    function resizeCanvas(src,w,h){
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(src,0,0,w,h);return c;
    }
    const ca=resizeCanvas(ec,W,H),cb=resizeCanvas(pc,W,H);
    const dc=document.getElementById('dc');
    const{diffBlocks,totalBlocks,pct}=diffCanvases(ca,cb,dc);

    setP(100,'完成！');
    setTimeout(()=>{
      document.getElementById('pw').style.display='none';
      document.getElementById('st').textContent='';
      document.getElementById('rw').style.display='block';

      const verdict=document.getElementById('verdict');
      if(pct<=3){
        verdict.className='verdict v-pass';
        verdict.textContent='✅ 兩份檔案高度一致，可以送印';
      } else {
        verdict.className='verdict v-fail';
        verdict.textContent=`❌ 發現差異，建議人工確認後再送印`;
      }

      document.getElementById('stats').innerHTML=`
        <div class="snum"><span class="n" style="color:${pct>3?'#e74c3c':'#2ecc71'}">${pct}%</span><span class="l">差異比例</span></div>
        <div class="sdiv"></div>
        <div class="snum"><span class="n" style="color:#f39c12">${diffBlocks}</span><span class="l">差異區塊數</span></div>
        <div class="sdiv"></div>
        <div class="snum"><span class="n">${totalBlocks}</span><span class="l">總區塊數</span></div>`;

      document.getElementById('hint').innerHTML=
        pct<=3
          ? '✅ 差異比例極低，兩份檔案內容一致。'
          : `⚠️ 紅色區域為差異位置，請對照上方兩張預覽圖確認。差異比例 ${pct}%，${pct>15?'差異明顯，請仔細確認。':'少量差異，可能為字體渲染差異，請人工確認。'}`;
    },300);

  }catch(err){
    setErr(err.message);
  }finally{
    document.getElementById('btn').disabled=false;check();
  }
}
</script>
</body>
