<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPS × PDF 校稿工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.0.4/tesseract.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root{--ink:#1a1410;--paper:#f5f0e8;--gold:#b8860b;--gl:#d4a843;--red:#c0392b;--green:#2d6a4f;--amber:#d97706;--border:#c8b89a;--card:#fdfaf4}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:'Noto Serif TC',serif,sans-serif;min-height:100vh}
  header{text-align:center;padding:32px 20px 22px;border-bottom:2px solid var(--border)}
  header::after{content:'';display:block;width:60px;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:12px auto 0}
  h1{font-size:1.5rem;font-weight:600;letter-spacing:.1em}
  h1 span{color:var(--gold)}
  .sub{font-size:.76rem;color:#7a6a5a;margin-top:6px}
  .wrap{max-width:680px;margin:0 auto;padding:24px 16px 60px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
  .zone{display:block;background:var(--card);border:2px dashed var(--border);border-radius:6px;padding:22px 14px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
  .zone:hover{border-color:var(--gold);background:#fefcf5}
  .zone.done{border-style:solid;border-color:var(--green);background:#f0faf4}
  .zone .bar{position:absolute;top:0;left:0;right:0;height:3px;opacity:0;transition:opacity .2s;background:linear-gradient(90deg,var(--green),#52b788,var(--green))}
  .zone.done .bar{opacity:1}
  .zone-icon{font-size:1.8rem;margin-bottom:6px}
  .zone-label{font-size:.82rem;font-weight:600;color:var(--gold);letter-spacing:.08em}
  .zone-hint{font-size:.68rem;color:#9a8a7a;margin-top:3px}
  .zone-name{font-size:.68rem;font-family:monospace;color:var(--green);margin-top:6px;word-break:break-all}
  input[type=file]{display:none}
  .btn{display:block;width:100%;padding:14px;background:var(--ink);color:var(--gl);border:none;border-radius:4px;font-size:.9rem;font-weight:600;letter-spacing:.16em;cursor:pointer;font-family:inherit;margin-bottom:20px;transition:all .2s}
  .btn:disabled{background:#c8b89a;color:#f5f0e8;cursor:not-allowed}
  .prog-wrap{background:#e8dfc8;border-radius:2px;height:4px;margin-bottom:8px;overflow:hidden;display:none}
  .prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gl));width:0%;transition:width .4s}
  .status{text-align:center;font-size:.8rem;color:#7a6a5a;margin-bottom:14px;min-height:18px;line-height:1.6}
  .status.err{color:var(--red)}
  .previews{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
  .pbox{background:var(--card);border:1px solid var(--border);border-radius:4px;overflow:hidden}
  .ptitle{background:var(--ink);color:var(--gl);font-size:.7rem;font-weight:600;letter-spacing:.1em;padding:6px 12px}
  .pimg{width:100%;height:160px;object-fit:contain;background:#1a1410;display:block}
  .verdict{text-align:center;padding:13px;border-radius:4px;margin-bottom:16px;font-weight:600;font-size:.88rem;letter-spacing:.06em}
  .v-pass{background:#d1fae5;color:var(--green);border:1px solid #6ee7b7}
  .v-warn{background:#fef3c7;color:var(--amber);border:1px solid #fcd34d}
  .v-fail{background:#fee2e2;color:var(--red);border:1px solid #fca5a5}
  .counts{background:var(--ink);color:var(--paper);border-radius:4px;padding:14px 18px;margin-bottom:20px;display:flex;gap:16px;justify-content:center;align-items:center}
  .cnum{text-align:center}
  .cnum .n{font-size:1.6rem;font-weight:600;display:block;line-height:1}
  .cnum .l{font-size:.66rem;letter-spacing:.08em;color:#c8b89a;margin-top:2px}
  .cdiv{width:1px;height:30px;background:rgba(255,255,255,.15)}
  .sec-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;margin-top:18px}
  .sec-head span{font-size:.7rem;font-weight:600;letter-spacing:.12em;color:#9a8a7a;white-space:nowrap}
  .sec-head::after{content:'';flex:1;height:1px;background:var(--border)}
  .item{background:var(--card);border:1px solid var(--border);border-left:4px solid var(--border);border-radius:0 4px 4px 0;padding:11px 14px;margin-bottom:8px;font-size:.84rem;line-height:1.7}
  .item.diff{border-left-color:var(--red);background:#fff8f8}
  .item.warn{border-left-color:var(--amber);background:#fffbf0}
  .item.ok{border-left-color:var(--green);background:#f0faf4}
  .item-field{font-weight:600;font-size:.72rem;color:#5a4a3a;display:block;margin-bottom:3px}
  .diff-cols{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
  .diff-col{background:rgba(0,0,0,.05);border-radius:2px;padding:6px 9px;font-size:.75rem;font-family:monospace}
  .diff-col-lbl{font-size:.63rem;font-weight:600;color:#7a6a5a;margin-bottom:2px;font-family:inherit}
  .empty{text-align:center;padding:36px 20px;color:#9a8a7a;font-size:.84rem}
  .empty .ico{font-size:2.4rem;display:block;margin-bottom:10px;opacity:.3}
  @media(max-width:480px){.grid2,.previews,.diff-cols{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <h1>EPS <span>×</span> PDF 校稿工具</h1>
  <p class="sub">自動比對差異 · 送印前最後把關</p>
</header>
<div class="wrap">
  <div class="grid2">
    <label class="zone" id="ez" for="ei">
      <div class="bar"></div>
      <div class="zone-icon">📐</div>
      <div class="zone-label">EPS 原始稿</div>
      <div class="zone-hint">點擊選擇 .eps</div>
      <div class="zone-name" id="en"></div>
      <input type="file" id="ei" accept=".eps,application/postscript">
    </label>
    <label class="zone" id="pz" for="pi">
      <div class="bar"></div>
      <div class="zone-icon">📄</div>
      <div class="zone-label">PDF 校稿稿</div>
      <div class="zone-hint">點擊選擇 .pdf</div>
      <div class="zone-name" id="pn"></div>
      <input type="file" id="pi" accept=".pdf,application/pdf">
    </label>
  </div>
  <div class="prog-wrap" id="pw"><div class="prog-fill" id="pf"></div></div>
  <div class="status" id="st"></div>
  <button class="btn" id="btn" disabled onclick="run()">▶ 開始比對校稿</button>
  <div class="previews" id="prevs" style="display:none">
    <div class="pbox"><div class="ptitle">EPS 預覽</div><img class="pimg" id="eprev"></div>
    <div class="pbox"><div class="ptitle">PDF 預覽</div><canvas class="pimg" id="pprev"></canvas></div>
  </div>
  <div id="results"></div>
  <div class="empty" id="empty"><span class="ico">🔍</span>上傳兩份檔案後點擊比對</div>
</div>
<script>

let epsFile=null, pdfFile=null;

function setup(ii,zi,ni,type){
  const inp=document.getElementById(ii);
  const zone=document.getElementById(zi);
  const nameEl=document.getElementById(ni);
  inp.addEventListener('change',e=>{
    const f=e.target.files[0];if(!f)return;
    if(type==='eps')epsFile=f;else pdfFile=f;
    nameEl.textContent=f.name+' ('+(f.size/1024).toFixed(0)+'KB)';
    zone.classList.add('done');check();
  });
}
setup('ei','ez','en','eps');
setup('pi','pz','pn','pdf');
function check(){document.getElementById('btn').disabled=!(epsFile&&pdfFile);}
function setP(pct,txt){
  document.getElementById('pw').style.display='block';
  document.getElementById('pf').style.width=pct+'%';
  if(txt!==undefined){const s=document.getElementById('st');s.textContent=txt;s.className='status';}
}
function setErr(txt){
  const s=document.getElementById('st');s.textContent='❌ '+txt;s.className='status err';
  document.getElementById('pw').style.display='none';
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// Convert EPS to PNG via CloudConvert
async function epsToPNG(file){
  setP(10,'上傳 EPS 到 CloudConvert...');

  // Step 1: Create job
  const jobResp = await fetch('https://api.cloudconvert.com/v2/jobs',{
    method:'POST',
    headers:{'Authorization':'Bearer '+CC_KEY,'Content-Type':'application/json'},
    body:JSON.stringify({
      tasks:{
        'upload-eps':{operation:'import/upload'},
        'convert-to-png':{operation:'convert',input:'upload-eps',input_format:'eps',output_format:'png',engine:'graphicsmagick'},
        'export-png':{operation:'export/url',input:'convert-to-png'}
      }
    })
  });
  const job = await jobResp.json();
  if(!jobResp.ok) throw new Error('CloudConvert 建立任務失敗: '+(job.message||JSON.stringify(job)));

  const uploadTask = job.data.tasks.find(t=>t.name==='upload-eps');

  // Step 2: Upload file
  setP(20,'上傳 EPS 檔案...');
  const formData = new FormData();
  Object.entries(uploadTask.result.form.parameters).forEach(([k,v])=>formData.append(k,v));
  formData.append('file', file);
  const uploadResp = await fetch(uploadTask.result.form.url,{method:'POST',body:formData});
  if(!uploadResp.ok) throw new Error('上傳失敗');

  // Step 3: Wait for conversion
  setP(35,'CloudConvert 轉換中...');
  const jobId = job.data.id;
  let pngUrl = null;
  for(let i=0;i<30;i++){
    await new Promise(r=>setTimeout(r,2000));
    const statusResp = await fetch('https://api.cloudconvert.com/v2/jobs/'+jobId,{
      headers:{'Authorization':'Bearer '+CC_KEY}
    });
    const status = await statusResp.json();
    const exportTask = status.data.tasks.find(t=>t.name==='export-png');
    if(exportTask?.status==='finished'){
      pngUrl = exportTask.result.files[0].url;
      break;
    }
    if(status.data.status==='error') throw new Error('CloudConvert 轉換失敗');
  }
  if(!pngUrl) throw new Error('轉換逾時');

  // Step 4: Download PNG
  setP(50,'下載轉換結果...');
  const pngResp = await fetch(pngUrl);
  const pngBlob = await pngResp.blob();
  return URL.createObjectURL(pngBlob);
}

// Render PDF to canvas - auto crop to content area
async function renderPDF(file){
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buf}).promise;
  const page = await pdf.getPage(1);
  
  // First render at low res to detect content bounds
  const vpLow = page.getViewport({scale:1});
  const tmpCanvas = document.createElement('canvas');
  tmpCanvas.width = vpLow.width; tmpCanvas.height = vpLow.height;
  await page.render({canvasContext:tmpCanvas.getContext('2d'), viewport:vpLow}).promise;
  
  // Find content bounding box
  const ctx = tmpCanvas.getContext('2d');
  const imgData = ctx.getImageData(0, 0, tmpCanvas.width, tmpCanvas.height);
  const data = imgData.data;
  let minX=tmpCanvas.width, maxX=0, minY=tmpCanvas.height, maxY=0;
  for(let y=0;y<tmpCanvas.height;y++){
    for(let x=0;x<tmpCanvas.width;x++){
      const i=(y*tmpCanvas.width+x)*4;
      // Non-white pixel
      if(data[i]<240||data[i+1]<240||data[i+2]<240){
        if(x<minX)minX=x; if(x>maxX)maxX=x;
        if(y<minY)minY=y; if(y>maxY)maxY=y;
      }
    }
  }
  
  // Add padding
  const pad=10;
  minX=Math.max(0,minX-pad); minY=Math.max(0,minY-pad);
  maxX=Math.min(tmpCanvas.width,maxX+pad); maxY=Math.min(tmpCanvas.height,maxY+pad);
  
  // If content found, render at high res and crop
  const scale = 4; // High res for OCR
  const vpHigh = page.getViewport({scale});
  const fullCanvas = document.createElement('canvas');
  fullCanvas.width=vpHigh.width; fullCanvas.height=vpHigh.height;
  await page.render({canvasContext:fullCanvas.getContext('2d'),viewport:vpHigh}).promise;
  
  // Crop to content area (scaled)
  const cropW = (maxX-minX)*scale;
  const cropH = (maxY-minY)*scale;
  const canvas = document.getElementById('pprev');
  canvas.width = cropW; canvas.height = cropH;
  canvas.getContext('2d').drawImage(fullCanvas,
    minX*scale, minY*scale, cropW, cropH,
    0, 0, cropW, cropH
  );
  return canvas;
}

// OCR
async function ocr(source, label){
  setP(undefined, `OCR 辨識${label}文字中...`);
  const result = await Tesseract.recognize(source,['chi_tra','eng'],{
    logger:m=>{if(m.status==='recognizing text') setP(undefined,`OCR ${label}：${Math.round(m.progress*100)}%`);}
  });
  return result.data.text;
}

function diffTexts(epsText, pdfText){
  const clean=t=>t.split('\n').map(l=>l.trim()).filter(l=>l.length>2);
  const epsLines=clean(epsText);
  const pdfLines=clean(pdfText);

  function sim(a,b){
    if(a===b)return 1;
    if(a.includes(b)||b.includes(a))return 0.85;
    const sa=new Set(a),sb=new Set(b);
    if(!sa.size||!sb.size)return 0;
    const inter=[...sa].filter(c=>sb.has(c)).length;
    return inter/(sa.size+sb.size-inter);
  }

  const diffs=[],warns=[],oks=[];
  for(const line of pdfLines){
    const best=epsLines.reduce((a,b)=>sim(b,line)>sim(a,line)?b:a, '');
    const s=sim(best,line);
    if(s>0.75){
      if(s===1) oks.push({field:'文字行',value:line.slice(0,80)});
      else diffs.push({field:'文字差異',pdf_value:line.slice(0,80),eps_value:best.slice(0,80),severity:'medium'});
    } else {
      warns.push({field:'PDF 有，EPS 未確認',reason:line.slice(0,80),suggestion:'請人工對照 EPS 確認'});
    }
  }
  for(const line of epsLines){
    const best=pdfLines.reduce((a,b)=>sim(b,line)>sim(a,line)?b:a,'');
    if(!best||sim(best,line)<=0.75)
      diffs.push({field:'EPS 獨有文字',eps_value:line.slice(0,80),pdf_value:'（PDF 中未找到）',severity:'high'});
  }

  const high=diffs.filter(d=>d.severity==='high').length;
  const verdict=high>0?'fail':diffs.length||warns.length?'warn':'pass';
  return{
    verdict,
    summary:verdict==='pass'?'兩份檔案內容一致':verdict==='fail'?`發現 ${diffs.length} 處差異，請確認後再送印`:`發現 ${diffs.length} 處差異、${warns.length} 項待確認`,
    differences:diffs, warnings:warns.slice(0,40), confirmed_match:oks,
    notes:`EPS ${epsLines.length} 行，PDF ${pdfLines.length} 行`, epsText, pdfText
  };
}

async function run(){
  if(!epsFile||!pdfFile)return;
  document.getElementById('btn').disabled=true;
  document.getElementById('results').innerHTML='';
  document.getElementById('empty').style.display='none';
  document.getElementById('prevs').style.display='grid';

  try{
    // EPS → PNG via CloudConvert
    const epsPngUrl = await epsToPNG(epsFile);
    document.getElementById('eprev').src = epsPngUrl;

    // PDF → Canvas
    setP(55,'渲染 PDF...');
    const pdfCanvas = await renderPDF(pdfFile);

    // OCR both
    setP(60,'OCR 辨識中...');
    const epsText = await ocr(epsPngUrl, 'EPS');
    setP(75,'');
    const pdfText = await ocr(pdfCanvas, 'PDF');

    setP(95,'比對差異...');
    const result = diffTexts(epsText, pdfText);

    setP(100,'完成！');
    setTimeout(()=>{
      document.getElementById('pw').style.display='none';
      document.getElementById('st').textContent='';
      renderResults(result);
    },300);

  }catch(err){
    setErr(err.message);
  }finally{
    document.getElementById('btn').disabled=false;
    check();
  }
}

function renderResults(r){
  const vMap={pass:{cls:'v-pass',icon:'✅'},fail:{cls:'v-fail',icon:'❌'},warn:{cls:'v-warn',icon:'⚠️'}};
  const v=vMap[r.verdict]||vMap.warn;
  const diffs=r.differences||[],warns=r.warnings||[],oks=r.confirmed_match||[];
  let html=`
    <div class="verdict ${v.cls}">${v.icon}  ${esc(r.summary)}</div>
    <div class="counts">
      <div class="cnum"><span class="n" style="color:#e74c3c">${diffs.length}</span><span class="l">發現差異</span></div>
      <div class="cdiv"></div>
      <div class="cnum"><span class="n" style="color:#f39c12">${warns.length}</span><span class="l">待確認</span></div>
      <div class="cdiv"></div>
      <div class="cnum"><span class="n" style="color:#2ecc71">${oks.length}</span><span class="l">確認一致</span></div>
    </div>`;
  if(diffs.length){
    html+=`<div class="sec-head"><span>⚠ 發現差異</span></div>`;
    html+=diffs.map(d=>`<div class="item diff"><span class="item-field">${d.severity==='high'?'🔴':d.severity==='medium'?'🟠':'🟡'} ${esc(d.field)}</span><div class="diff-cols"><div class="diff-col"><div class="diff-col-lbl">EPS</div>${esc(d.eps_value||'—')}</div><div class="diff-col"><div class="diff-col-lbl">PDF</div>${esc(d.pdf_value||'—')}</div></div></div>`).join('');
  }
  if(warns.length){
    html+=`<div class="sec-head"><span>❓ 待人工確認</span></div>`;
    html+=warns.map(w=>`<div class="item warn"><span class="item-field">❓ ${esc(w.field)}</span><div>${esc(w.reason)}</div>${w.suggestion?`<div style="margin-top:4px;font-size:.73rem;color:#92400e">💡 ${esc(w.suggestion)}</div>`:''}</div>`).join('');
  }
  if(oks.length){
    html+=`<div class="sec-head"><span>✓ 確認一致</span></div>`;
    html+=oks.slice(0,20).map(o=>`<div class="item ok"><span class="item-field">✓ ${esc(o.field)}</span><div>${esc(o.value)}</div></div>`).join('');
  }
  if(r.notes) html+=`<div class="sec-head"><span>📝 備註</span></div><div class="item">${esc(r.notes)}</div>`;
  document.getElementById('results').innerHTML=html;
}
</script>
